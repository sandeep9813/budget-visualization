<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
</head>
<body>
    <h1>Backend API Connection Test</h1>
    <button onclick="testConnection()">Test Connection</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing connection...';
            
            try {
                // Test 1: Basic server connection
                console.log('Testing server connection...');
                const serverResponse = await fetch('http://localhost:6000/');
                const serverText = await serverResponse.text();
                console.log('Server response:', serverText);
                
                // Test 2: Feedback API
                console.log('Testing feedback API...');
                const feedbackResponse = await fetch('http://localhost:6000/api/feedbacks');
                const feedbackData = await feedbackResponse.json();
                console.log('Feedback API response:', feedbackData);
                
                // Test 3: Stats API
                console.log('Testing stats API...');
                const statsResponse = await fetch('http://localhost:6000/api/feedbacks/stats');
                const statsData = await statsResponse.json();
                console.log('Stats API response:', statsData);
                
                resultDiv.innerHTML = `
                    <h3>✅ All tests passed!</h3>
                    <p><strong>Server:</strong> ${serverText}</p>
                    <p><strong>Feedbacks:</strong> ${feedbackData.success ? 'Success' : 'Failed'}</p>
                    <p><strong>Stats:</strong> ${statsData.success ? 'Success' : 'Failed'}</p>
                    <p><strong>Total Feedbacks:</strong> ${feedbackData.data?.length || 0}</p>
                `;
                
            } catch (error) {
                console.error('Connection test failed:', error);
                resultDiv.innerHTML = `
                    <h3>❌ Connection failed!</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>This could be due to:</p>
                    <ul>
                        <li>Backend server not running</li>
                        <li>CORS issue</li>
                        <li>Network connectivity problem</li>
                    </ul>
                `;
            }
        }
    </script>
</body>
</html>
